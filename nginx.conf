# Nginx configuration for Next.js (zhixincn.com) on Hostinger VPS
# Copy to: /etc/nginx/sites-available/zhixincn.com
#   sudo cp /path/to/zhixin/nginx.conf /etc/nginx/sites-available/zhixincn.com
# Then: sudo nginx -t && sudo systemctl reload nginx
#
# Paths below use /root/var/www/nextjs/zhixin (typical root@ VPS deploy dir).
# If your app lives elsewhere, replace that prefix everywhere (root, alias, location blocks).
#
# PORT CONTRACT (must match PM2; never share a port with soleyb2b.com):
#   zhixincn.com -> localhost:3003
#   soleyb2b.com  -> localhost:3001  (see soley-b2b/nginx.conf)

upstream nextjs_zhixin {
    server localhost:3003;
    keepalive 64;
}

server {
    listen 80;
    server_name zhixincn.com www.zhixincn.com;

    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name zhixincn.com www.zhixincn.com;

    ssl_certificate /etc/letsencrypt/live/zhixincn.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zhixincn.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    root /root/var/www/nextjs/zhixin;

    client_max_body_size 10M;

    # Slow mobile / long-distance links: avoid premature upstream timeouts
    proxy_connect_timeout 75s;
    proxy_send_timeout 120s;
    proxy_read_timeout 120s;

    types {
        application/javascript js mjs;
        text/css css;
        image/svg+xml svg;
    }

    # Serve Next.js CSS assets from disk.
    # Next emits CSS under `.next/static/css/*.css` (hashed filenames).
    location ^~ /_next/static/css/ {
        alias /root/var/www/nextjs/zhixin/.next/static/css/;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        # If user has stale HTML referencing old CSS, proxy to Node.js.
        error_page 404 = @nextjs_zhixin_static_fallback;
    }

    location ^~ /_next/static/ {
        alias /root/var/www/nextjs/zhixin/.next/static/;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        error_page 404 = @nextjs_zhixin_static_fallback;
    }

    location @nextjs_zhixin_static_fallback {
        proxy_pass http://nextjs_zhixin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /public/ {
        alias /root/var/www/nextjs/zhixin/public/;
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";

        try_files $uri =404;
    }

    location ~ ^/icon\.svg {
        proxy_pass http://nextjs_zhixin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /favicon.ico {
        proxy_pass http://nextjs_zhixin/favicon.ico;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* ^/(?!/_next/|icon\.svg|favicon\.ico|robots\.txt|sitemap\.xml)(.*\.(jpg|jpeg|png|gif|ico|svg))$ {
        root /root/var/www/nextjs/zhixin/public;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";

        try_files $uri =404;
    }

    location /_next/data/ {
        proxy_pass http://nextjs_zhixin;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    location /api/ {
        proxy_pass http://nextjs_zhixin;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    }

    location / {
        proxy_pass http://nextjs_zhixin;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;

        proxy_intercept_errors on;
        error_page 500 502 503 504 = @nextjs_zhixin_error;
    }

    location @nextjs_zhixin_error {
        return 502 "Next.js server is down. Please check if the application is running on port 3003.";
    }

    access_log /var/log/nginx/zhixincn.com.access.log;
    error_log /var/log/nginx/zhixincn.com.error.log;
}
