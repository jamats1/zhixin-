# Temporary: HTTP only until /etc/letsencrypt/live/zhixincn.com/ exists.
# After: sudo cp /root/var/www/nextjs/zhixin/nginx.conf /etc/nginx/sites-available/zhixincn.com && sudo nginx -t && sudo systemctl reload nginx

upstream nextjs_zhixin {
    server localhost:3003;
    keepalive 64;
}

server {
    listen 80;
    server_name zhixincn.com www.zhixincn.com;

    location / {
        proxy_pass http://nextjs_zhixin;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
